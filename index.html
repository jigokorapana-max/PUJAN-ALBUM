<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Album</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

#book{

    width:847px;
    height:1240px;

}

.page{

    background:white;
    overflow:hidden;

}

.page img{

    width:100%;
    height:100%;
    object-fit:cover;

}

/* MOBILE */

@media(max-width:900px){

#book{

    width:300px;
    height:440px;

}

}

</style>
</head>

<body>

<script>

const pageFlip = new St.PageFlip(

document.getElementById("book"),

{
    width:847,
    height:1240,

    size:"stretch",

    minWidth:300,
    maxWidth:847,

    minHeight:440,
    maxHeight:1240,

    showCover:true,
    mobileScrollSupport:false
});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));
